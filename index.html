<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Name - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
      body { margin: 0; background-color: white; color: black; }
      .header { text-align: center; padding: 2em; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Your Name</h1>
        <p>A Collection of Quantitative Research Projects</p>
    </div>

    <div id="3d-graph"></div>

    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/three-spritetext"></script>
    <script src="//unpkg.com/3d-force-graph"></script>

    <script>
      // The magic happens here!
      const graphContainer = document.getElementById('3d-graph');

      // Fetch your project data
      fetch('projects.json')
        .then(res => res.json())
        .then(projects => {
          const nodes = [];
          const links = [];

          // Create a node for each project
          projects.forEach(p => {
            nodes.push({
              id: p.id,
              name: p.title,
              ring: p.ring,
              url: `project.html?id=${p.id}` // Link to the project page
            });
          });
          
          // Connect nodes to a central point or to each other
          // Here, we'll connect each project to its subsequent one for a chain
          for (let i = 0; i < projects.length - 1; i++) {
            links.push({ source: projects[i].id, target: projects[i+1].id });
          }

          const graphData = { nodes, links };
          
          // Initialize and configure the 3D graph
          const Graph = ForceGraph3D()
            (graphContainer)
              .graphData(graphData)
              .nodeLabel('name') // Show project name on hover
              .nodeColor(() => 'rgba(0, 0, 0, 0.8)')
              .linkColor(() => 'rgba(0, 0, 0, 0.4)')
              .linkWidth(0.5)
              .onNodeClick(node => {
                // Go to project page on click
                window.location.href = node.url;
              });

          // Set camera position
          Graph.cameraPosition({ z: 400 });
        });
    </script>

</body>
</html>
